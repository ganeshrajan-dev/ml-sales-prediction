apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: sales-predictor
  labels:
    app: sales-predictor

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sales-predictor

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
          