apiVersion: apps/v1
kind: Deployment

metadata:
  name: sales-predictor
  labels:
    app: sales-predictor
  
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sales-predictor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sales-predictor
    spec:
      containers:
        - name: model-api
          image: 049559537457.dkr.ecr.us-east-1.amazonaws.com/adidas-sales-predictor:v1
          ports:
            - containerPort: 5000
          env:
            - name: MODEL_VERSION
              value: "v1"
            - name: MODEL_DIR
              value: "/app/model"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

            
            



  
